name: Deploy Dr Robby to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build check
        run: npm run build

      - name: Zip artifact
        run: |
          zip -r release.zip index.html styles.css main.js package.json server.js scripts

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: drrobby232825119
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
